name: Report coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run tests with coverage
        run: npm ci && npx vitest run --coverage
        continue-on-error: true

      - name: Report coverage to dashboard
        if: github.ref == 'refs/heads/main'
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          TOKEN: ${{ secrets.COVERAGE_API_TOKEN }}
        run: |
          set -euo pipefail
          COVERAGE_JSON="coverage/coverage-summary.json"
          if [[ -z "${DASHBOARD_URL:-}" || -z "${TOKEN:-}" ]]; then
            echo "::warning::Skipping — missing secrets"
            exit 0
          fi
          if [[ ! -f "$COVERAGE_JSON" ]]; then
            echo "::warning::Coverage file not found"
            exit 0
          fi
          COVERAGE=$(jq -r '.total.lines.pct // empty' "$COVERAGE_JSON" | xargs printf '%.0f')
          echo "Line coverage: ${COVERAGE}%"
          curl -sS --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            "${DASHBOARD_URL}/api/repos/${{ github.repository }}/coverage" \
            -d "{\"coverage\": $COVERAGE, \"commit_sha\": \"${{ github.sha }}\"}"
